version: '3.8'

services:
  # Контейнер для генерации конфигурации (запускается один раз)
  config-builder:
    build:
      context: .
      dockerfile: Dockerfile.config
    container_name: xray-config-builder
    volumes:
      - ./configs:/app/configs
      - ./settings.env:/app/settings.env
      - ./config.json:/app/config.json
    command: /bin/bash -c "./install-config.sh"
    profiles:
      - setup  # Запускается только при явном указании
  # docker compose --profile setup run --rm config-builder && docker compose --profile setup down --rmi local

  # Основной контейнер Xray
  xray:
    build:
      context: .
      dockerfile: Dockerfile.xray
    container_name: xray
    restart: unless-stopped
    network_mode: host  # Для доступа ко всем портам
    volumes:
      - ./:/etc/xray
    cap_add:
      - NET_ADMIN
    depends_on:
      - wireguard
    entrypoint: /bin/bash
    command: |
      -c "
      # Настройка маршрутов для отправки трафика через WireGuard
      ip route add 172.20.0.0/24 dev eth0 || true
      ip route add default via 172.20.0.2 table 100 || true
      ip rule add fwmark 100 table 100 || true

      # Запуск Xray
      exec /usr/bin/xray run -config /etc/xray/config.json
      "

  # Контейнер для генерации конфигурации (запускается один раз)
  wg-config-builder:
    image: linuxserver/wireguard
    container_name: wg-config-builder
    volumes:
      - ./wg/config:/config
      - ./scripts/wg-generate.sh:/wg-generate.sh:ro
    entrypoint: /bin/bash
    command: /wg-generate.sh
    profiles:
      - setup

  # Wireguard клиент
  wireguard:
    image: linuxserver/wireguard
    container_name: wg-client
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
    volumes:
      - ./wg/config:/config
      - /lib/modules:/lib/modules
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      xray-network:
        ipv4_address: 172.20.0.2
    restart: unless-stopped

networks:
  xray-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  configs:
    driver: local
  logs:
    driver: local

